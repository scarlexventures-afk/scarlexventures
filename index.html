    <!-- CORE BUSINESS INTERACTION ENGINE SCRIPT -->
    <script>
        // Track console validation status state variables
        let isAdminAuthenticated = false;

        // Database Core State 
        let currentProducts = JSON.parse(localStorage.getItem('scarlex_catalog')) || [
            {
                id: "p1",
                name: "Rolls-Royce Collection Frame",
                category: "Luxury Cars",
                mrp: 7999,
                sellingPrice: 5499,
                image: "https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?q=80&w=600&auto=format&fit=crop",
                specs: "Handcrafted layout structure showcasing premium tier aesthetic definitions."
            },
            {
                id: "p2",
                name: "Ferrari F1 Frame",
                category: "Formula 1",
                mrp: 6999,
                sellingPrice: 4999,
                image: "https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=600&auto=format&fit=crop",
                specs: "Perfect statement track alignment for premium desktop racing configurations."
            }
        ];

        function syncStorage() {
            localStorage.setItem('scarlex_catalog', JSON.stringify(currentProducts));
        }

        function triggerAdminAuth() {
            if (isAdminAuthenticated) {
                navigateTo('admin');
            } else {
                navigateTo('admin-auth');
            }
        }

        function verifyAdminPasscode() {
            const secret = document.getElementById('auth-pass-input').value;
            if (secret === "SCARLEX2026") {
                isAdminAuthenticated = true;
                navigateTo('admin');
            } else {
                alert('Invalid Security Passcode Profile Credentials Refused.');
            }
        }

        function logoutAdmin() {
            isAdminAuthenticated = false;
            navigateTo('home');
        }

        function navigateTo(viewId) {
            // Guard view block access routing permissions manually
            if (viewId === 'admin' && !isAdminAuthenticated) {
                viewId = 'admin-auth';
            }

            const container = document.getElementById('app-view-container');
            const template = document.getElementById(`view-${viewId}`);
            if (!template) return;
            
            container.innerHTML = '';
            container.appendChild(template.content.cloneNode(true));
            window.scrollTo({ top: 0 });

            // Initialize views
            if (viewId === 'home') renderGrid('home-featured-products-grid');
            if (viewId === 'shop') renderGrid('shop-catalog-grid');
            if (viewId === 'admin') renderAdminTable();
        }

        function renderGrid(targetId) {
            const grid = document.getElementById(targetId);
            if (!grid) return;
            grid.innerHTML = '';

            currentProducts.forEach(product => {
                const discountPercentage = Math.round(((product.mrp - product.sellingPrice) / product.mrp) * 100);
                
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl overflow-hidden p-4 flex flex-col justify-between border border-zinc-900';
                card.innerHTML = `
                    <div class="relative w-full aspect-square bg-zinc-900 rounded-lg overflow-hidden mb-4 border border-zinc-800 flex items-center justify-center">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110">
                        ${discountPercentage > 0 ? `<span class="absolute top-2 left-2 bg-brand text-white text-[10px] font-bold px-2 py-0.5 rounded">${discountPercentage}% OFF</span>` : ''}
                    </div>
                    <div>
                        <span class="text-[10px] uppercase font-mono tracking-widest text-brand font-semibold">${product.category}</span>
                        <h3 class="text-sm font-bold text-white tracking-wide mt-1 truncate font-montserrat">${product.name}</h3>
                        <p class="text-[11px] text-zinc-500 font-light mt-1 line-clamp-2">${product.specs || ''}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-zinc-900 flex justify-between items-center">
                        <div>
                            <span class="text-xs text-zinc-500 line-through mr-1.5">₹${product.mrp}</span>
                            <span class="text-sm font-bold text-white">₹${product.sellingPrice}</span>
                        </div>
                        <a href="https://wa.me/918402906422?text=Hi%20Bishal,%20I%20want%20to%20buy%20the%20${encodeURIComponent(product.name)}" target="_blank" class="bg-zinc-900 hover:bg-brand text-[11px] font-semibold text-white px-3 py-1.5 rounded transition-all flex items-center gap-1 border border-zinc-800">
                            <i class="fa-brands fa-whatsapp text-green-500"></i> Order
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderAdminTable() {
            const tableBody = document.getElementById('admin-inventory-table');
            if (!tableBody) return;
            tableBody.innerHTML = '';

            currentProducts.forEach((product, index) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-zinc-900 hover:bg-zinc-900/10 transition-colors';
                row.innerHTML = `
                    <td class="py-3 px-2">
                        <img src="${product.image}" class="w-10 h-10 object-cover rounded border border-zinc-800">
                    </td>
                    <td class="py-3 font-medium text-white">
                        <div class="font-bold">${product.name}</div>
                        <div class="text-[10px] text-zinc-600 font-mono">${product.id}</div>
                    </td>
                    <td class="py-3 text-zinc-400">${product.category}</td>
                    <td class="py-3 font-mono text-zinc-500">₹${product.mrp}</td>
                    <td class="py-3 font-mono text-white font-bold">₹${product.sellingPrice}</td>
                    <td class="py-3 text-center">
                        <button onclick="deleteProduct(${index})" class="text-zinc-600 hover:text-brand transition-colors p-2 text-sm" title="Remove Product">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function handleDeployProduct() {
            const name = document.getElementById('admin-name').value.trim();
            const mrp = parseFloat(document.getElementById('admin-mrp').value);
            const selling = parseFloat(document.getElementById('admin-selling').value);
            const category = document.getElementById('admin-category').value;
            const specs = document.getElementById('admin-specs').value.trim();
            const imageFileInput = document.getElementById('admin-image-file');

            if (!name || !mrp || !selling) {
                alert('Please accurately fill out the Product Name, MRP and Selling Price columns!');
                return;
            }

            const newProduct = {
                id: "PROD-" + Date.now().toString().slice(-6),
                name: name,
                category: category,
                mrp: mrp,
                sellingPrice: selling,
                specs: specs,
                image: "https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?q=80&w=600&auto=format&fit=crop"
            };

            if (imageFileInput.files && imageFileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    newProduct.image = e.target.result;
                    currentProducts.unshift(newProduct);
                    syncStorage();
                    renderAdminTable();
                    alert('Success! Custom image uploaded and frame appended safely to your active live catalog.');
                    resetForm();
                };
                reader.readAsDataURL(imageFileInput.files[0]);
            } else {
                currentProducts.unshift(newProduct);
                syncStorage();
                renderAdminTable();
                alert('Success! Frame appended safely with default placeholder asset configuration.');
                resetForm();
            }
        }

        function deleteProduct(index) {
            if (confirm('Are you absolutely sure you want to remove this item from your live catalog?')) {
                currentProducts.splice(index, 1);
                syncStorage();
                renderAdminTable();
            }
        }

        function resetForm() {
            document.getElementById('admin-name').value = '';
            document.getElementById('admin-mrp').value = '';
            document.getElementById('admin-selling').value = '';
            document.getElementById('admin-specs').value = '';
            document.getElementById('admin-image-file').value = '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.opacity = '0';
                setTimeout(() => loader ? loader.remove() : null, 700);
            }, 800);

            navigateTo('home');
        });
    </script>
</body>
</html>
