<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCARLEX VENTURES | Official Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #FFFFFF; font-family: 'Poppins', sans-serif; }
        .glass-card { background: rgba(22, 22, 22, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased">

    <nav class="bg-black border-b border-zinc-900 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-widest">SCARLEX <span class="text-red-600">VENTURES</span></h1>
        <button onclick="navigateTo('admin')" class="text-xs bg-zinc-900 px-3 py-1 rounded border border-zinc-800">ADMIN</button>
    </nav>

    <main id="app-view-container" class="p-4"></main>

    <template id="view-admin">
        <div class="max-w-4xl mx-auto space-y-6">
            <h2 class="text-2xl font-bold uppercase">Operations Console</h2>
            <div class="glass-card p-6 rounded-xl space-y-4">
                <input type="hidden" id="edit-prod-idx" value="-1">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="admin-name" placeholder="Product Name" class="bg-zinc-900 p-2 rounded w-full">
                    <input type="number" id="admin-mrp" placeholder="MRP" class="bg-zinc-900 p-2 rounded w-full">
                    <input type="number" id="admin-selling" placeholder="Selling Price" class="bg-zinc-900 p-2 rounded w-full">
                    <input type="text" id="admin-img-url" placeholder="Image URL" class="bg-zinc-900 p-2 rounded w-full">
                </div>
                <button onclick="handleDeployProduct()" id="upload-btn" class="w-full bg-red-600 py-3 rounded font-bold uppercase hover:bg-red-700 transition-all">Upload Product</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead><tr class="text-zinc-500 uppercase text-xs"><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody id="admin-inventory-table"></tbody>
                </table>
            </div>
        </div>
    </template>

    <script>
        // ⚠️ CRITICAL: ADD YOUR JSONBIN KEYS HERE
        const cloudVaultEndpointUrl = "https://api.jsonbin.io/v3/b/YOUR_BIN_ID"; 
        const cloudVaultMasterAccessKey = "YOUR_MASTER_KEY";

        let currentProducts = [];

        async function syncStorage() {
            try {
                await fetch(cloudVaultEndpointUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': $2a$10$DJChfscCUnBVaEIlRC97kOgBNhG8ZcaNJUIr0.IuZjFgVsDfJdUJi },
                    body: JSON.stringify({ catalog: currentProducts })
                });
                alert('Cloud Sync Successful!');
            } catch (err) { alert('Sync Failed: ' + err.message); }
        }

        async function pullData() {
            try {
                const res = await fetch(`${cloudVaultEndpointUrl}/latest`, { headers: { 'X-Master-Key': $2a$10$DJChfscCUnBVaEIlRC97kOgBNhG8ZcaNJUIr0.IuZjFgVsDfJdUJi } });
                const data = await res.json();
                currentProducts = data.record.catalog || [];
                renderAdminTable();
            } catch (e) { console.warn("Loading local fallback"); }
        }

        function handleDeployProduct() {
            const idx = parseInt(document.getElementById('edit-prod-idx').value);
            const product = {
                id: idx >= 0 ? currentProducts[idx].id : "P" + Date.now(),
                name: document.getElementById('admin-name').value,
                mrp: document.getElementById('admin-mrp').value,
                sellingPrice: document.getElementById('admin-selling').value,
                image: document.getElementById('admin-img-url').value
            };

            if (idx >= 0) currentProducts[idx] = product;
            else currentProducts.unshift(product);

            syncStorage().then(() => {
                renderAdminTable();
                clearAdminAssetFormState();
            });
        }

        function prepareProductFormStateForEdit(idx) {
            const p = currentProducts[idx];
            document.getElementById('edit-prod-idx').value = idx;
            document.getElementById('admin-name').value = p.name;
            document.getElementById('admin-mrp').value = p.mrp;
            document.getElementById('admin-selling').value = p.sellingPrice;
            document.getElementById('admin-img-url').value = p.image;
            document.getElementById('upload-btn').innerText = "Update Product";
        }

        function clearAdminAssetFormState() {
            document.getElementById('edit-prod-idx').value = "-1";
            document.getElementById('upload-btn').innerText = "Upload Product";
            // Reset fields here...
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-inventory-table');
            tbody.innerHTML = currentProducts.map((p, i) => `
                <tr class="border-b border-zinc-800">
                    <td class="py-2">${p.name}</td>
                    <td class="py-2">₹${p.sellingPrice}</td>
                    <td class="py-2"><button onclick="prepareProductFormStateForEdit(${i})" class="text-blue-500">Edit</button></td>
                </tr>
            `).join('');
        }

        function navigateTo(viewId) {
            const container = document.getElementById('app-view-container');
            container.innerHTML = document.getElementById(`view-${viewId}`).innerHTML;
            if(viewId === 'admin') renderAdminTable();
        }

        window.onload = pullData;
    </script>
</body>
</html>
