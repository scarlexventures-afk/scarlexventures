<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCARLEX VENTURES | Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #000; color: #fff; }
        .glass-card { background: rgba(15, 15, 15, 0.9); border: 1px solid #222; backdrop-filter: blur(10px); }
        .text-brand { color: #ef4444; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="sticky top-0 z-50 bg-black border-b border-zinc-800 p-4 flex justify-between items-center px-8">
        <div class="text-xl font-bold tracking-widest cursor-pointer" onclick="navigateTo('home')">SCARLEX</div>
        <div class="space-x-8 text-xs font-bold uppercase">
            <button onclick="navigateTo('home')" class="hover:text-red-500">Home</button>
            <button onclick="navigateTo('shop')" class="hover:text-red-500">Shop</button>
            <button onclick="navigateTo('admin')" class="hover:text-red-500">Admin</button>
        </div>
    </nav>

    <main id="app-view-container" class="p-4 md:p-12"></main>

    <!-- TEMPLATES -->
    <template id="view-home">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-montserrat font-bold mb-12">EXQUISITE COLLECTIBLES</h1>
            <div id="home-featured-products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </template>

    <template id="view-shop">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-2xl font-bold mb-8 uppercase">Catalog</h1>
            <div id="shop-catalog-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </template>

    <template id="view-admin">
        <div class="max-w-3xl mx-auto glass-card p-8 rounded-xl">
            <h2 class="text-2xl font-montserrat font-bold mb-6">ADMIN INVENTORY</h2>
            <div class="space-y-4 mb-10">
                <input type="text" id="admin-name" placeholder="Item Name" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded">
                <input type="number" id="admin-selling" placeholder="Price (INR)" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded">
                <input type="file" id="admin-image-file" accept="image/*" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded text-sm">
                <input type="hidden" id="admin-img-url">
                <button onclick="handleDeployProduct()" class="w-full bg-red-600 py-3 font-bold uppercase hover:bg-red-700 transition">Deploy Product</button>
            </div>
            <table class="w-full text-left text-sm">
                <thead><tr class="border-b border-zinc-800 text-zinc-500 uppercase"><th class="py-2">Item</th><th class="py-2">Price</th><th class="py-2">Action</th></tr></thead>
                <tbody id="admin-inventory-table"></tbody>
            </table>
        </div>
    </template>

    <script>
        const BIN_ID = "6a5281f0f5f4af5e2981a17b";
        const MASTER_KEY = "$2a$10$DJChfscCUnBVaEIlRC97kOgBNhG8ZcaNJUIr0.IuZjFgVsDfJdUJi";
        let currentProducts = [];

        // Image to Base64 Handler
        document.addEventListener('change', (e) => {
            if(e.target.id === 'admin-image-file') {
                const reader = new FileReader();
                reader.onload = () => { document.getElementById('admin-img-url').value = reader.result; };
                if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
            }
        });

        async function syncStorage() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ catalog: currentProducts })
            });
        }

        async function handleDeployProduct() {
            const product = {
                id: Date.now(),
                name: document.getElementById('admin-name').value,
                sellingPrice: document.getElementById('admin-selling').value,
                image: document.getElementById('admin-img-url').value
            };
            currentProducts.push(product);
            await syncStorage();
            alert("Artifact Deployed.");
            navigateTo('admin');
        }

        function navigateTo(viewId) {
            const container = document.getElementById('app-view-container');
            container.innerHTML = document.getElementById(`view-${viewId}`).innerHTML;

            if(viewId === 'home' || viewId === 'shop') {
                const grid = document.getElementById(viewId === 'home' ? 'home-featured-products-grid' : 'shop-catalog-grid');
                grid.innerHTML = currentProducts.map(p => `
                    <div class="glass-card p-4 rounded-xl border border-zinc-800">
                        <img src="${p.image}" class="w-full h-48 object-cover rounded mb-4">
                        <h3 class="font-bold">${p.name}</h3>
                        <p class="text-brand">₹${p.sellingPrice}</p>
                    </div>
                `).join('');
            } else if(viewId === 'admin') {
                document.getElementById('admin-inventory-table').innerHTML = currentProducts.map((p, i) => `
                    <tr class="border-b border-zinc-800">
                        <td class="py-4">${p.name}</td>
                        <td class="py-4">₹${p.sellingPrice}</td>
                        <td class="py-4"><button onclick="deleteProduct(${i})" class="text-zinc-500 hover:text-red-500">Delete</button></td>
                    </tr>
                `).join('');
            }
        }

        async function deleteProduct(i) {
            currentProducts.splice(i, 1);
            await syncStorage();
            navigateTo('admin');
        }

        window.onload = async () => {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': MASTER_KEY} });
            const data = await res.json();
            currentProducts = data.record.catalog || [];
            navigateTo('home');
        };
    </script>
</body>
</html>
