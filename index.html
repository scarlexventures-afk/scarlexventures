<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCARLEX VENTURES | Premium 3D Frame Collectibles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#E50914', bgMain: '#0A0A0A', bgCard: '#161616' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #FFFFFF; font-family: 'Poppins', sans-serif; }
        .glass-card { background: rgba(22, 22, 22, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-bgMain/95 backdrop-blur-md border-b border-zinc-900 px-6 py-4 flex items-center justify-between">
        <a href="#" onclick="navigateTo('home')" class="text-xl font-bold tracking-wider">SCARLEX <span class="text-brand">VENTURES</span></a>
        <div class="flex gap-4">
            <button onclick="navigateTo('shop')" class="text-xs uppercase">Shop</button>
            <button onclick="navigateTo('admin')" class="text-xs uppercase text-brand">Admin</button>
        </div>
    </nav>

    <main id="app-view-container" class="min-h-screen p-6"></main>

    <template id="view-home">
        <div class="text-center py-20">
            <h1 class="text-5xl font-bold mb-4">PREMIUM 3D FRAMES</h1>
            <button onclick="navigateTo('shop')" class="bg-brand px-8 py-3 rounded">Shop Collection</button>
        </div>
    </template>

    <template id="view-admin">
        <div class="max-w-4xl mx-auto space-y-6">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4">
                <h1 class="text-2xl font-bold">OPERATIONS CONSOLE</h1>
                <button onclick="syncToCloud()" class="bg-emerald-600 px-4 py-2 rounded text-xs uppercase font-bold">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save & Sync All
                </button>
            </div>
            
            <div class="bg-bgCard p-6 rounded-lg border border-zinc-800">
                <h2 class="text-sm font-bold mb-4 uppercase">Update Catalog</h2>
                <div class="space-y-4">
                    <input type="text" id="admin-name" placeholder="Artifact Name" class="w-full bg-zinc-900 p-3 rounded border border-zinc-700">
                    <input type="number" id="admin-price" placeholder="Selling Price" class="w-full bg-zinc-900 p-3 rounded border border-zinc-700">
                    <button onclick="addLocalProduct()" class="w-full bg-brand p-3 rounded font-bold uppercase">Add to Ledger</button>
                </div>
            </div>
        </div>
    </template>

    <script>
        let currentProducts = JSON.parse(localStorage.getItem('products')) || [];

        function navigateTo(viewId) {
            const container = document.getElementById('app-view-container');
            const template = document.getElementById(`view-${viewId}`);
            container.innerHTML = template.innerHTML;
        }

        function addLocalProduct() {
            const name = document.getElementById('admin-name').value;
            const price = document.getElementById('admin-price').value;
            currentProducts.push({ name, price });
            localStorage.setItem('products', JSON.stringify(currentProducts));
            alert("Added locally!");
        }

        async function syncToCloud() {
            const response = await fetch("https://api.jsonbin.io/v3/b/669041bfad19ca34f886fdfb", {
                method: 'PUT',
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": "$2a$10$wK1hO/9xV5p.H105W5kLpOnUqGepH2K6Zk.JkW0lQ286wG6e.F.jW"
                },
                body: JSON.stringify({ products: currentProducts })
            });
            if(response.ok) alert("Synced to cloud successfully!");
        }

        // Initialize
        window.onload = () => navigateTo('home');
    </script>
</body>
</html>
